<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity | Multi-Agent Dashboard</title>
    <!-- Use Tailwind CSS for rapid styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .msg-enter {
            animation: fadeIn 0.3s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Dark mode aesthetics matching Antigravity theme */
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0d1117;
        }
        ::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #8b949e;
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- Header -->
    <header class="border-b border-gray-700 bg-gray-900 shadow p-4 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">
                Multi-Agent Monitor
            </h1>
            <span class="text-xs px-2 py-1 rounded bg-green-900 text-green-300 font-mono">LIVE</span>
        </div>
        <div>
            <button onclick="clearMessages()" class="px-4 py-2 bg-red-800 hover:bg-red-700 text-white rounded text-sm shadow transition font-semibold">
                Clear History
            </button>
        </div>
    </header>

    <!-- Status Belt -->
    <div id="status-belt" class="bg-gray-800 border-b border-gray-700 p-2 flex space-x-4 overflow-x-auto">
        <!-- Agent statuses will be injected here -->
        <span class="text-xs text-gray-500 italic px-2">Gathering team status...</span>
    </div>

    <!-- Main Container -->
    <main class="flex-1 overflow-hidden flex flex-col p-4">
        <!-- Message List Container -->
        <div id="message-container" class="flex-1 overflow-y-auto w-full max-w-5xl mx-auto bg-gray-800 rounded-lg shadow-lg border border-gray-700 p-4 space-y-4">
            <!-- Messages will be injected here -->
            <div class="text-center text-gray-500 py-10" id="empty-state">
                Waiting for agent streams...
            </div>
        </div>
    </main>

    <!-- Script for polling and rendering -->
    <script>
        const container = document.getElementById('message-container');
        const emptyState = document.getElementById('empty-state');
        let lastMessageId = 0;
        let isScrolledToBottom = true;

        // Auto-scroll logic
        container.addEventListener('scroll', () => {
            const threshold = 100; // pixels
            const position = container.scrollTop + container.clientHeight;
            const height = container.scrollHeight;
            isScrolledToBottom = position > height - threshold;
        });

        // Map roles to colors
        const RoleColors = {
            'planner': 'bg-blue-900 border-blue-700 text-blue-200',
            'code': 'bg-green-900 border-green-700 text-green-200',
            'test': 'bg-yellow-900 border-yellow-700 text-yellow-200',
            'review': 'bg-purple-900 border-purple-700 text-purple-200',
            'system': 'bg-gray-700 border-gray-600 text-gray-300',
            'user': 'bg-rose-900 border-rose-700 text-rose-200'
        };

        function getRoleColor(role) {
            // Default to gray if role not directly matched, trying to match substring
            const r = role.toLowerCase();
            if (r.includes('plan')) return RoleColors['planner'];
            if (r.includes('code')) return RoleColors['code'];
            if (r.includes('test')) return RoleColors['test'];
            if (r.includes('review')) return RoleColors['review'];
            if (r.includes('system')) return RoleColors['system'];
            return 'bg-gray-800 border-gray-600 text-gray-300';
        }

        function formatTime(timestampStr) {
            const d = new Date(timestampStr + 'Z'); // Convert to UTC object
            return d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
        }

        function renderMessage(msg) {
            if (emptyState) emptyState.style.display = 'none';

            const colorClasses = getRoleColor(msg.sender_role);
            const timeStr = formatTime(msg.created_at);

            const div = document.createElement('div');
            div.className = `msg-enter px-4 py-3 rounded-lg border shadow-sm ${colorClasses} w-full`;

            div.innerHTML = `
                <div class="flex justify-between items-center mb-1 border-b border-opacity-20 border-white pb-1">
                    <div class="flex items-center space-x-2">
                        <span class="font-bold text-sm tracking-wider uppercase opacity-90">${msg.sender_role}</span>
                        <span class="text-xs opacity-50 px-1 border border-opacity-30 border-white rounded">▶ ${msg.receiver_role}</span>
                    </div>
                    <div class="text-xs opacity-60 font-mono flex items-center space-x-2">
                        <span>#${msg.topic}</span>
                        <span>${timeStr}</span>
                    </div>
                </div>
                <div class="text-sm whitespace-pre-wrap font-mono mt-2 leading-relaxed opacity-90">${escapeHtml(msg.content)}</div>
            `;

            container.appendChild(div);
        }

        // Basic HTML escape
        function escapeHtml(unsafe) {
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }

        async function fetchMessages() {
            try {
                // Fetch all messages (API limits to 100 recent)
                // In a prod app, we'd use lastMessageId to only fetch new ones
                const res = await fetch('/api/messages');
                const data = await res.json();

                if (data.messages && data.messages.length > 0) {
                    // Check if there are new messages
                    const maxId = Math.max(...data.messages.map(m => m.id));
                    if (maxId > lastMessageId) {
                        // We need to re-render. For simplicity, we just clear and re-render everything
                        // since our endpoint limits to 100 recent.

                        // Only clear if empty state is hidden (meaning we've rendered before)
                        if (lastMessageId > 0) {
                            container.innerHTML = '';
                        }

                        data.messages.forEach(msg => {
                            renderMessage(msg);
                            lastMessageId = Math.max(lastMessageId, msg.id);
                        });

                        if (isScrolledToBottom) {
                            container.scrollTo(0, container.scrollHeight);
                        }
                    }
                }
            } catch (err) {
                console.error("Error fetching messages:", err);
            }
        }

        async function clearMessages() {
            if(confirm("Are you sure you want to clear the message bus?")) {
                await fetch('/api/clear', { method: 'POST' });
                container.innerHTML = '<div class="text-center text-gray-500 py-10" id="empty-state">Waiting for agent streams...</div>';
                lastMessageId = 0;
            }
        }

        // Poll every 1 second
        setInterval(fetchMessages, 1000);
        setInterval(fetchStatuses, 2000); // Status updates a bit slower

        async function fetchStatuses() {
            try {
                const res = await fetch('/api/statuses');
                const data = await res.json();
                const belt = document.getElementById('status-belt');

                if (data.statuses && data.statuses.length > 0) {
                    belt.innerHTML = '';
                    data.statuses.forEach(agent => {
                        const statusColor = agent.status === 'WORKING' ? 'bg-green-500' : 'bg-gray-500';
                        const pulseClass = agent.status === 'WORKING' ? 'animate-pulse' : '';

                        const div = document.createElement('div');
                        div.className = "flex items-center space-x-2 bg-gray-900 border border-gray-700 px-3 py-1 rounded-full shadow-inner min-w-fit";
                        div.innerHTML = `
                            <div class="w-2 h-2 rounded-full ${statusColor} ${pulseClass}"></div>
                            <span class="text-xs font-bold uppercase tracking-tighter">${agent.role}</span>
                            <span class="text-[10px] opacity-60 italic truncate max-w-[150px]">${agent.status} ${agent.current_task ? '| ' + agent.current_task : ''}</span>
                        `;
                        belt.appendChild(div);
                    });
                }
            } catch (err) {
                console.error("Status fetch error:", err);
            }
        }
        // Initial fetch
        fetchMessages();
    </script>
</body>
</html>
